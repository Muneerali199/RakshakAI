# RakshakAI v2 — Optional ablation: 14B upgrade path
# Same recipe as phase A but on Qwen2.5-Coder-14B-Instruct.
# 2× compute, 2× cost. Use only after 7B baseline ships.
# Time: ~7 h on 1× MI300X → ~$14

base_model: Qwen/Qwen2.5-Coder-14B-Instruct
model_type: Qwen2ForCausalLM
tokenizer_type: Qwen2Tokenizer

output_dir: /workspace/rakshakai/v2/outputs/runs/ablation_14b
run_name: rakshakai-v2-ablation-14b

load_in_4bit: true
bnb_4bit_quant_type: nf4
bnb_4bit_use_double_quant: true
bnb_4bit_compute_dtype: bfloat16

adapter: lora
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target_modules: all-linear
lora_modules_to_save: ["lm_head", "embed_tokens"]
lora_use_rslora: true
lora_bias: none

sequence_len: 4096
sample_packing: true
flash_attention: true
pad_to_sequence_len: false
micro_batch_size: 4
gradient_accumulation_steps: 8
eval_batch_size: 4

optimizer: paged_adamw_8bit
lr: 1.5e-4
lr_scheduler: cosine
warmup_ratio: 0.03
weight_decay: 0.0
max_grad_norm: 1.0
bf16: true
tf32: false
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
neftune_noise_alpha: 5

datasets:
  - path: /workspace/rakshakai/v2/inputs/datasets/pack/phase_a
    type: custom_jsonl
    field: messages
    roles:
      user: user
      assistant: assistant
      system: system

dataset_prepared_path: /workspace/rakshakai/v2/inputs/datasets/pack/phase_a_prepared

val_set_size: 0.02
evals_per_epoch: 4
eval_steps: 200
save_steps: 200
save_total_limit: 2
save_strategy: steps
evaluation_strategy: steps
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
early_stopping_patience: 5

max_steps: 4000
warmup_steps: 120

logging_steps: 10
report_to: wandb
wandb_project: rakshakai-v2
wandb_run_name: ablation-14b-qwen-qlora

seed: 42
special_tokens:
  pad_token: "<|endoftext|>"
