# RakshakAI 14B SFT - FIXED VERSION
# Changes from original:
# - Added gradient clipping (max_grad_norm: 1.0)
# - Reduced eval frequency (500→2000 steps)
# - Increased eval sample size (100→500)
# - Added early stopping patience
# - Better logging for monitoring

adapter: qlora
base_model: Qwen/Qwen2.5-Coder-14B-Instruct
bf16: true
dataloader_num_workers: 4
dataset_prepared_path: v2/prepared/sft_14b

datasets:
  - type: chat_template
    chat_template: chatml
    field_messages: messages
    path: v2/inputs/datasets/axolotl/train_250k.jsonl
    split: train

eval_datasets:
  - type: chat_template
    chat_template: chatml
    field_messages: messages
    path: v2/inputs/datasets/axolotl/val_cleaned.jsonl
    split: val

# Evaluation settings
eval_sample_max_num: 500  # Increased from 100 for better validation
eval_steps: 2000           # Reduced from 500 to save time
eval_strategy: steps
eval_sample_packing: false # Disable for accurate val loss

# Training hyperparameters
learning_rate: 1.5e-4
num_epochs: 1
warmup_ratio: 0.03
lr_scheduler: cosine
optimizer: adamw_8bit

# Batch settings
micro_batch_size: 8
gradient_accumulation_steps: 2  # Effective batch = 16

# Memory optimization
load_in_4bit: true
gradient_checkpointing: true
flash_attention: true
bf16: true
tf32: true

# Gradient control (NEW - prevents explosions)
max_grad_norm: 1.0

# LoRA settings
lora_r: 32
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
lora_modules_to_save:
  - embed_tokens
  - lm_head

# Data settings
sequence_len: 4096
sample_packing: true
group_by_length: true
train_on_inputs: false  # Don't compute loss on prompts

# Checkpoint settings
output_dir: v2/model/sft_14b
save_strategy: steps
save_steps: 2000  # Aligned with eval_steps
save_total_limit: 3  # Keep best 3 checkpoints

# Early stopping (NEW)
early_stopping_patience: 3  # Stop if no improvement for 3 evals
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false

# Logging
logging_steps: 10
report_to: none  # Can enable tensorboard/wandb later

# Tokenization
special_tokens:
  pad_token: <|endoftext|>

# Reproducibility
seed: 42

# RL settings (not used in SFT)
rl_beta: null
