# RakshakAI v2 — Phase B: SFT on multi-language snippets + secure fixes
# Builds on Phase A LoRA. Continues training.
# Data: SecurityEval + Juliet + PrimeVul test pairs + CVE descriptions
# Time: ~2.5 h on 1× MI300X → ~$5

base_model: Qwen/Qwen2.5-Coder-7B-Instruct
model_type: Qwen2ForCausalLM
tokenizer_type: Qwen2Tokenizer

# --- Output ---
output_dir: /workspace/rakshakai/v2/outputs/runs/phase_b
run_name: rakshakai-v2-phaseB

# --- Loading ---
load_in_4bit: true
bnb_4bit_quant_type: nf4
bnb_4bit_use_double_quant: true
bnb_4bit_compute_dtype: bfloat16

# --- LoRA (continue from phase A) ---
adapter: lora
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target_modules: all-linear
lora_modules_to_save: ["lm_head", "embed_tokens"]
lora_use_rslora: true
lora_bias: none

# --- Sequence / batch ---
sequence_len: 4096
sample_packing: true
flash_attention: true
pad_to_sequence_len: false
micro_batch_size: 6
gradient_accumulation_steps: 6
eval_batch_size: 6

# --- Optimizer ---
optimizer: paged_adamw_8bit
lr: 1.0e-4        # lower than A: refine, don't over-write
lr_scheduler: cosine
warmup_ratio: 0.03
weight_decay: 0.0
max_grad_norm: 1.0
bf16: true
tf32: false
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
neftune_noise_alpha: 5

# --- Data ---
datasets:
  - path: /workspace/rakshakai/v2/inputs/datasets/pack/phase_b
    type: custom_jsonl
    field: messages
    roles:
      user: user
      assistant: assistant
      system: system

dataset_prepared_path: /workspace/rakshakai/v2/inputs/datasets/pack/phase_b_prepared

# --- Eval / save ---
val_set_size: 0.02
evals_per_epoch: 4
eval_steps: 80
save_steps: 80
save_total_limit: 3
save_strategy: steps
evaluation_strategy: steps
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
early_stopping_patience: 5
early_stopping_threshold: 0.001

# --- Steps ---
max_steps: 3000
warmup_steps: 90

# --- Logging ---
logging_steps: 10
report_to: wandb
wandb_project: rakshakai-v2
wandb_run_name: phaseB-qwen7b-qlora

# --- Misc ---
seed: 43
special_tokens:
  pad_token: "<|endoftext|>"
