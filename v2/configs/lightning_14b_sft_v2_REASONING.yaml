# RakshakAI 14B SFT — Reasoning-Enhanced (9K DeepSeek V4 Pro traces + 250K SFT)
# Uses train_87k_with_reasoning.jsonl — includes step-by-step security reasoning
# and proof-of-concept exploits generated by DeepSeek V4 Pro ($0.30 total cost)
adapter: qlora
base_model: Qwen/Qwen2.5-Coder-14B-Instruct
bf16: true
dataloader_num_workers: 4
dataset_prepared_path: v2/prepared/sft_14b_reasoning

datasets:
  - type: chat_template
    chat_template: chatml
    field_messages: messages
    path: v2/inputs/datasets/axolotl/train_87k_with_reasoning.jsonl
    split: train

eval_datasets:
  - type: chat_template
    chat_template: chatml
    field_messages: messages
    path: v2/inputs/datasets/axolotl/val_cleaned.jsonl
    split: val

eval_sample_max_num: 500
eval_steps: 2000
eval_strategy: steps
eval_sample_packing: false

learning_rate: 1.5e-4
num_epochs: 1
warmup_ratio: 0.03
lr_scheduler: cosine
optimizer: adamw_8bit

micro_batch_size: 8
gradient_accumulation_steps: 2

load_in_4bit: true
gradient_checkpointing: true
flash_attention: true
tf32: true

max_grad_norm: 1.0

lora_r: 32
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
lora_modules_to_save:
  - embed_tokens
  - lm_head

sequence_len: 4096
sample_packing: true
group_by_length: true
train_on_inputs: false

output_dir: v2/model/sft_14b
save_strategy: steps
save_steps: 2000
save_total_limit: 3

early_stopping_patience: 3
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false

logging_steps: 10
report_to: none

special_tokens:
  pad_token: <|endoftext|>

seed: 42
rl_beta: null
