# RakshakAI v2 — Phase A: SFT on real-world CVE-bearing code
# Base: Qwen2.5-Coder-7B-Instruct
# Method: QLoRA (NF4, double-quant), LoRA r=64 on all linear, rsLoRA
# Data: BigVul + Devign + PrimeVul → ~40K instruction pairs
# Time: ~3.5 h on 1× MI300X @ $2/hr → ~$7

base_model: Qwen/Qwen2.5-Coder-7B-Instruct
model_type: Qwen2ForCausalLM
tokenizer_type: Qwen2Tokenizer

# --- Output ---
output_dir: /workspace/rakshakai/v2/outputs/runs/phase_a
run_name: rakshakai-v2-phaseA

# --- Loading ---
load_in_4bit: true
bnb_4bit_quant_type: nf4
bnb_4bit_use_double_quant: true
bnb_4bit_compute_dtype: bfloat16

# --- LoRA ---
adapter: lora
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target_modules: all-linear
lora_modules_to_save: ["lm_head", "embed_tokens"]
lora_use_rslora: true
lora_bias: none

# --- Sequence / batch ---
sequence_len: 4096
sample_packing: true
flash_attention: true
pad_to_sequence_len: false
micro_batch_size: 8
gradient_accumulation_steps: 4
eval_batch_size: 8
group_by_length: false

# --- Optimizer ---
optimizer: paged_adamw_8bit
lr: 2.0e-4
lr_scheduler: cosine
warmup_ratio: 0.03
weight_decay: 0.0
max_grad_norm: 1.0
bf16: true
tf32: false
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

# --- NEFTune for instruction robustness ---
neftune_noise_alpha: 5

# --- Data ---
datasets:
  - path: /workspace/rakshakai/v2/inputs/datasets/pack/phase_a
    type: custom_jsonl
    field: messages
    roles:
      user: user
      assistant: assistant
      system: system

dataset_prepared_path: /workspace/rakshakai/v2/inputs/datasets/pack/phase_a_prepared

# --- Eval / save ---
val_set_size: 0.02
evals_per_epoch: 4
eval_steps: 100
save_steps: 100
save_total_limit: 3
save_strategy: steps
evaluation_strategy: steps
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
early_stopping_patience: 5
early_stopping_threshold: 0.001

# --- Steps ---
max_steps: 4000   # ~2 epochs on 40K packed sequences
warmup_steps: 120

# --- Logging ---
logging_steps: 10
report_to: wandb
wandb_project: rakshakai-v2
wandb_run_name: phaseA-qwen7b-qlora

# --- Misc ---
seed: 42
special_tokens:
  pad_token: "<|endoftext|>"
