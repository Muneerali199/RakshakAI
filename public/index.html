<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RakshakAI — Security Code Analysis</title>
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a2e;
    --fg: #e0e0e0;
    --fg2: #888;
    --accent: #00ccff;
    --accent2: #ffcc00;
    --green: #00ff88;
    --red: #ff4444;
    --orange: #ff8800;
    --border: #2a2a3e;
    --radius: 8px;
    --font: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh; display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 16px; font-weight: 600;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  #model-select {
    background: var(--bg3); color: var(--fg);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 6px 12px; font-size: 13px; font-family: var(--font);
    cursor: pointer;
  }
  #model-select:focus { outline: none; border-color: var(--accent); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); display: inline-block;
  }
  .status-dot.error { background: var(--red); }
  .status-dot.loading { background: var(--orange); animation: pulse 1s infinite; }

  /* ── Chat Area ── */
  #chat { flex: 1; overflow-y: auto; padding: 20px; }
  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    margin-bottom: 16px; max-width: 85%;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { margin-left: auto; }
  .msg.assistant { margin-right: auto; }
  .msg.system { margin: 8px auto; text-align: center; max-width: 100%; }

  .msg-content {
    padding: 12px 16px; border-radius: var(--radius);
    font-size: 14px; line-height: 1.6;
  }
  .msg.user .msg-content {
    background: var(--accent); color: #000;
    border-bottom-right-radius: 2px;
  }
  .msg.assistant .msg-content {
    background: var(--bg3); border: 1px solid var(--border);
    border-bottom-left-radius: 2px;
  }
  .msg.system .msg-content {
    background: transparent; color: var(--fg2); font-size: 12px;
  }

  .msg-content pre {
    background: var(--bg); padding: 12px; border-radius: 6px;
    overflow-x: auto; margin: 8px 0;
    font-family: var(--font); font-size: 13px;
  }
  .msg-content code {
    font-family: var(--font); font-size: 13px;
    background: var(--bg); padding: 2px 6px; border-radius: 3px;
  }
  .msg-content pre code { background: none; padding: 0; }

  /* ── Thinking block ── */
  .thinking-block {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); margin: 8px 0; overflow: hidden;
  }
  .thinking-header {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; cursor: pointer; user-select: none;
    font-size: 12px; color: var(--fg2);
  }
  .thinking-header:hover { background: var(--bg3); }
  .thinking-arrow { transition: transform 0.2s; font-size: 10px; }
  .thinking-arrow.open { transform: rotate(90deg); }
  .thinking-body {
    padding: 0 12px 8px; font-size: 12px; color: var(--fg2);
    font-family: var(--font); line-height: 1.5;
    display: none;
  }
  .thinking-body.open { display: block; }
  .thinking-line { padding: 2px 0; border-left: 2px solid var(--orange); padding-left: 8px; margin: 4px 0; }

  /* ── Thinking spinner (during generation) ── */
  .thinking-spinner {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; color: var(--fg2); font-size: 12px;
  }
  .spinner {
    width: 14px; height: 14px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Input Area ── */
  #input-area {
    padding: 12px 20px; background: var(--bg2);
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  #input-row {
    display: flex; gap: 8px; align-items: flex-end;
  }
  #chat-input {
    flex: 1; background: var(--bg3); color: var(--fg);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 14px; font-size: 14px; font-family: var(--font);
    resize: none; min-height: 42px; max-height: 150px;
    outline: none;
  }
  #chat-input:focus { border-color: var(--accent); }
  #chat-input::placeholder { color: var(--fg2); }
  #send-btn {
    background: var(--accent); color: #000; border: none;
    border-radius: var(--radius); padding: 10px 20px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s; height: 42px;
  }
  #send-btn:hover { opacity: 0.9; }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap;
  }
  .tool-btn {
    background: var(--bg3); color: var(--fg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 4px 10px;
    font-size: 11px; cursor: pointer; transition: all 0.2s;
  }
  .tool-btn:hover { border-color: var(--accent); color: var(--fg); }
  .tool-btn.active { border-color: var(--accent); color: var(--accent); }

  /* ── Scan Results ── */
  .vuln-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px; margin: 8px 0;
  }
  .vuln-card.critical { border-left: 3px solid var(--red); }
  .vuln-card.high { border-left: 3px solid var(--orange); }
  .vuln-card.medium { border-left: 3px solid var(--accent2); }
  .vuln-card.low { border-left: 3px solid var(--accent); }

  .vuln-title { font-weight: 600; font-size: 14px; }
  .vuln-severity { font-size: 11px; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-left: 8px; }
  .vuln-severity.critical { background: var(--red); color: #fff; }
  .vuln-severity.high { background: var(--orange); color: #fff; }
  .vuln-severity.medium { background: var(--accent2); color: #000; }
  .vuln-severity.low { background: var(--accent); color: #000; }
  .vuln-desc { font-size: 13px; color: var(--fg2); margin-top: 4px; }
  .vuln-code { font-family: var(--font); font-size: 12px; background: var(--bg); padding: 8px; border-radius: 4px; margin-top: 8px; overflow-x: auto; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    #chat { padding: 12px; }
    .msg { max-width: 100%; }
    #input-area { padding: 8px 12px; }
  }
</style>
</head>
<body>

<header>
  <h1>▲ RakshakAI</h1>
  <div class="header-right">
    <span class="status-dot" id="status-dot" title="Connected"></span>
    <select id="model-select">
      <option value="groq-llama-70b">Llama 3.3 70B (Groq)</option>
      <option value="groq-llama-8b">Llama 3.1 8B (Groq)</option>
      <option value="rakshak-14b">RakshakAI 14B (Modal)</option>
      <option value="gpt-4o-mini">GPT-4o Mini</option>
    </select>
  </div>
</header>

<div id="chat">
  <div class="msg system">
    <div class="msg-content">
      RakshakAI — AI-powered security code analysis.<br>
      Paste code, describe a vulnerability, or use the scan tools below.
    </div>
  </div>
</div>

<div id="input-area">
  <div id="input-row">
    <textarea id="chat-input" placeholder="Ask about code security, paste vulnerable code, or describe a vulnerability..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
  <div class="toolbar">
    <button class="tool-btn" onclick="analyzeClipboard()">📋 Analyze Clipboard</button>
    <button class="tool-btn" onclick="document.getElementById('file-input').click()">📁 Scan File</button>
    <button class="tool-btn" onclick="clearChat()">🗑 Clear</button>
    <input type="file" id="file-input" style="display:none" onchange="scanFile(this.files[0])">
  </div>
</div>

<script>
const GROQ_API_KEY = localStorage.getItem("groq_api_key") || "";
const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
const MODAL_URL = "https://alimuneerali245--rakshak-api-rakshakmodel-analyze-endpoint.modal.run";

const SYSTEM_PROMPT = `You are RakshakAI, a security-specialized code analysis model.
Analyze code for security vulnerabilities. Think step by step, then respond with JSON:
{
  "is_vulnerable": true/false,
  "vulnerability_type": "CWE-XXX or null",
  "severity": "critical|high|medium|low|clean",
  "explanation": "root cause",
  "attack_scenario": "how to exploit",
  "secure_fix": "how to fix"
}`;

const chat = document.getElementById("chat");
const input = document.getElementById("chat-input");
const sendBtn = document.getElementById("send-btn");
const statusDot = document.getElementById("status-dot");
const modelSelect = document.getElementById("model-select");

let conversation = [];
let isGenerating = false;
let thinkingLines = [];

// Auto-resize input
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 150) + "px";
});

// Enter to send, Shift+Enter for newline
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isGenerating) return;
  input.value = "";
  input.style.height = "auto";
  addMessage(text, "user");
  conversation.push({ role: "user", content: text });
  await generateResponse();
}

function addMessage(content, role, thinking = null) {
  const div = document.createElement("div");
  div.className = `msg ${role}`;

  const contentDiv = document.createElement("div");
  contentDiv.className = "msg-content";
  contentDiv.innerHTML = renderMarkdown(content);
  div.appendChild(contentDiv);

  if (thinking && thinking.length > 0) {
    const tb = createThinkingBlock(thinking);
    div.appendChild(tb);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function renderMarkdown(text) {
  if (!text) return "";
  // Escape HTML
  text = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  // Code blocks
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
  });
  // Inline code
  text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
  // Bold
  text = text.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  // Italic
  text = text.replace(/\*([^*]+)\*/g, "<em>$1</em>");
  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" style="color:var(--accent)">$1</a>');
  // Line breaks
  text = text.replace(/\n/g, "<br>");
  return text;
}

function escapeHtml(text) {
  return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function createThinkingBlock(thoughts) {
  const div = document.createElement("div");
  div.className = "thinking-block";

  const header = document.createElement("div");
  header.className = "thinking-header";
  header.innerHTML = `<span class="thinking-arrow">▶</span> <span>Show reasoning (${thoughts.length} steps)</span>`;
  header.onclick = () => {
    header.querySelector(".thinking-arrow").classList.toggle("open");
    body.classList.toggle("open");
  };

  const body = document.createElement("div");
  body.className = "thinking-body";
  body.innerHTML = thoughts.map(t => `<div class="thinking-line">${escapeHtml(t)}</div>`).join("");

  div.appendChild(header);
  div.appendChild(body);
  return div;
}

function addThinkingSpinner() {
  const div = document.createElement("div");
  div.className = "msg assistant";
  div.id = "spinner-msg";
  div.innerHTML = `<div class="msg-content"><div class="thinking-spinner"><div class="spinner"></div> <span>Analyzing...</span></div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeThinkingSpinner() {
  const el = document.getElementById("spinner-msg");
  if (el) el.remove();
}

async function generateResponse() {
  isGenerating = true;
  sendBtn.disabled = true;
  statusDot.className = "status-dot loading";

  addThinkingSpinner();

  const model = modelSelect.value;
  const messages = [{ role: "system", content: SYSTEM_PROMPT }, ...conversation];

  try {
    let response;
    if (model === "rakshak-14b") {
      response = await callModal(messages);
    } else {
      response = await callGroq(messages, model);
    }
    removeThinkingSpinner();

    const thinking = response.thinking || [];
    const content = response.content || "";

    if (content) {
      addMessage(content, "assistant", thinking);
      conversation.push({ role: "assistant", content });
    }
  } catch (e) {
    removeThinkingSpinner();
    addMessage(`Error: ${e.message}`, "assistant");
  }

  isGenerating = false;
  sendBtn.disabled = false;
  statusDot.className = "status-dot";
}

async function callGroq(messages, modelId) {
  const groqModelMap = {
    "groq-llama-70b": "llama-3.3-70b-versatile",
    "groq-llama-8b": "llama-3.1-8b-instant",
    "gpt-4o-mini": "llama-3.3-70b-versatile",
  };
  const groqModel = groqModelMap[modelId] || "llama-3.3-70b-versatile";

  const resp = await fetch(GROQ_URL, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${GROQ_API_KEY}`,
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      model: groqModel,
      messages: messages,
      temperature: 0.1,
      max_tokens: 2048,
    }),
  });

  if (!resp.ok) {
    const err = await resp.text();
    throw new Error(`API error: ${resp.status} — ${err.slice(0, 200)}`);
  }

  const data = await resp.json();
  const content = data.choices?.[0]?.message?.content || "";

  // Extract thinking from reasoning models
  const thinkMatch = content.match(/<think>([\s\S]*?)<\/think>/);
  const thinking = thinkMatch ? [thinkMatch[1].trim()] : [];
  const cleanContent = content.replace(/<think>[\s\S]*?<\/think>/g, "").trim();

  return { content: cleanContent || content, thinking };
}

async function callModal(messages) {
  const lastMsg = messages[messages.length - 1]?.content || "";
  const codeMatch = lastMsg.match(/```(\w*)\n([\s\S]*?)```/);
  const code = codeMatch ? codeMatch[2] : lastMsg;
  const lang = codeMatch ? codeMatch[1] : "python";

  const resp = await fetch(MODAL_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      code: code.slice(0, 4000),
      language: lang || "python",
      max_tokens: 1024,
    }),
    signal: AbortSignal.timeout(30000),
  });

  if (!resp.ok) throw new Error(`Modal error: ${resp.status}`);
  const data = await resp.json();
  const cwe = data.cwe || "";
  const raw = data.raw_output || "";
  const thinking = [data.thinking || `CWE classification: ${cwe}`];

  let content = raw;
  if (cwe) {
    content = `**Vulnerability Detected: ${cwe}**\n\nSeverity: ${data.severity || "unknown"}\n\n${data.explanation || raw}`;
  } else {
    content = raw || "No vulnerabilities detected.";
  }

  return { content, thinking };
}

async function analyzeClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    if (text) {
      input.value = text;
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 150) + "px";
      await sendMessage();
    }
  } catch (e) {
    addMessage("Could not read clipboard. Paste manually.", "assistant");
  }
}

async function scanFile(file) {
  if (!file) return;
  const text = await file.text();
  input.value = `Scan this ${file.name} for vulnerabilities:\n\`\`\`\n${text.slice(0, 3000)}\n\`\`\``;
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 150) + "px";
  await sendMessage();
}

function clearChat() {
  chat.innerHTML = `
    <div class="msg system">
      <div class="msg-content">Chat cleared. Ready for new analysis.</div>
    </div>`;
  conversation = [];
}
</script>
</body>
</html>
